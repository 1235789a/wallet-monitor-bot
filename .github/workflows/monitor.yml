name: Smart Money Bot - Monitor

on:
  schedule:
    # 每10分钟运行一次 (UTC)
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-telegram-bot[job-queue] requests

      - name: Create .env from GitHub Secrets
        run: |
          cat << EOF > .env
          TG_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          ETHERSCAN_API_KEY=${{ secrets.ETHERSCAN_API_KEY }}
          BSCSCAN_API_KEY=${{ secrets.BSCSCAN_API_KEY }}
          DATABASE_PATH=whale_tracker.db
          PRICE_USDT=5
          TRIAL_DAYS=3
          CHECK_INTERVAL_MINUTES=10
          TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
          MIN_USD_VALUE=1000
          SMART_USD_THRESHOLD=5000
          DIGEST_HOUR_UTC=12
          HEAT_TOP_N=10
          EOF

      - name: Seed smart wallets (first run)
        run: python seed_wallets.py

      - name: Run smart money scan
        timeout-minutes: 8
        run: |
          python -c "
          from monitor import scan_smart_money
          from config import SMART_MONEY_CHAINS
          alerts = scan_smart_money()
          if alerts:
              print(f'Found {len(alerts)} smart money moves')
              for a in alerts[:5]:
                  print(a[:200])
          else:
              print('No significant smart money activity in this cycle.')
          "

      - name: Generate daily digest
        run: |
          python -c "
          from alpha import AlphaAggregator
          agg = AlphaAggregator()
          digest = agg.generate_daily_digest()
          if digest:
              print(digest[:500])
          "

      - name: Commit state
        run: |
          git config user.name 'Smart Money Bot'
          git config user.email 'bot@sm.art'
          git add *.db last_state.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m '🤖 auto: update state [skip ci]'
          git push